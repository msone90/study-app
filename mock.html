<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>模擬考試</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f7f6f2; --bg2:#ffffff; --bg3:#eeece6;
  --text:#1e1c18; --text2:#6b6860; --text3:#a8a59e;
  --border:rgba(0,0,0,0.08); --border2:rgba(0,0,0,0.14);
  --radius:16px; --radius-sm:10px;
  --shadow:0 2px 10px rgba(0,0,0,0.06); --shadow-md:0 4px 20px rgba(0,0,0,0.09);
  --c-gr:#e05252; --c-gr-bg:#fdf2f2; --c-gr-bd:#f5c6c6;
  --c-jp:#2a9d8f; --c-jp-bg:#edf7f6; --c-jp-bd:#b2deda;
  --c-km:#5a4fcf; --c-km-bg:#f2f1fd; --c-km-bd:#cac7f5;
  --c-xp:#d4a017;
  --ok:#16a34a; --ok-bg:#f0fdf4; --ok-bd:#86efac;
  --ng:#dc2626; --ng-bg:#fef2f2; --ng-bd:#fca5a5;
  --warn:#d97706; --warn-bg:#fffbeb; --warn-bd:#fde68a;
  --font-d:'Nunito','Noto Sans TC',sans-serif;
  --font-b:'Noto Sans TC',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{background:var(--bg);}
body{font-family:var(--font-b);background:var(--bg);color:var(--text);min-height:100vh;}
.page{max-width:800px;margin:0 auto;padding:32px 28px 80px;}
@media(max-width:600px){.page{padding:20px 16px 64px;}}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;}
.back-btn{display:flex;align-items:center;gap:6px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:24px;padding:8px 16px;font-size:13px;font-weight:700;font-family:var(--font-d);color:var(--text2);cursor:pointer;text-decoration:none;transition:box-shadow .2s;}
.back-btn:hover{box-shadow:var(--shadow);}
.page-title{font-family:var(--font-d);font-size:20px;font-weight:900;}
.xp-chip{display:flex;align-items:center;gap:6px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:24px;padding:7px 14px;}
.xp-dot{width:14px;height:14px;border-radius:50%;background:var(--c-xp);}
.xp-val{font-family:var(--font-d);font-size:14px;font-weight:800;color:var(--c-xp);}

.screen{display:none;} .screen.active{display:block;}
.sec-h{font-family:var(--font-d);font-size:11px;font-weight:800;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;}

/* MONTHLY BANNER */
.monthly-banner{border-radius:var(--radius);padding:14px 18px;margin-bottom:24px;border:1.5px solid;}
.monthly-banner.done{background:var(--ok-bg);border-color:var(--ok-bd);}
.monthly-banner.pending{background:var(--warn-bg);border-color:var(--warn-bd);}
.mb-title{font-family:var(--font-d);font-size:14px;font-weight:800;margin-bottom:3px;}
.monthly-banner.done .mb-title{color:var(--ok);}
.monthly-banner.pending .mb-title{color:var(--warn);}
.mb-sub{font-size:12px;color:var(--text2);}

/* EXAM CARDS */
.exam-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;}
@media(max-width:480px){.exam-grid{grid-template-columns:1fr;}}
.exam-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:transform .18s,box-shadow .18s;box-shadow:var(--shadow);position:relative;overflow:hidden;}
.exam-card::before{content:'';position:absolute;right:-16px;top:-16px;width:72px;height:72px;border-radius:50%;opacity:.08;}
.exam-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}
.exam-card:active{transform:scale(.98);}
.exam-card.gr{border-color:var(--c-gr-bd);}.exam-card.gr::before{background:var(--c-gr);}
.exam-card.jp{border-color:var(--c-jp-bd);}.exam-card.jp::before{background:var(--c-jp);}
.exam-card.km{border-color:var(--c-km-bd);}.exam-card.km::before{background:var(--c-km);}
.exam-icon{font-family:var(--font-d);font-size:11px;font-weight:900;width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;}
.exam-card.gr .exam-icon{background:var(--c-gr-bg);color:var(--c-gr);}
.exam-card.jp .exam-icon{background:var(--c-jp-bg);color:var(--c-jp);}
.exam-card.km .exam-icon{background:var(--c-km-bg);color:var(--c-km);}
.exam-name{font-family:var(--font-d);font-size:15px;font-weight:800;margin-bottom:4px;}
.exam-sub{font-size:12px;color:var(--text2);line-height:1.4;margin-bottom:10px;}
.exam-meta{display:flex;flex-direction:column;gap:3px;}
.exam-meta-item{font-size:11px;color:var(--text3);font-family:var(--font-d);}
.exam-meta-item strong{color:var(--text2);}
.last-score{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:11px;color:var(--text3);font-family:var(--font-d);}
.last-score span{font-weight:700;color:var(--c-km);}

/* KM SUBMENU */
.km-sub-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
.km-sub-card{background:var(--bg2);border:1.5px solid var(--c-km-bd);border-radius:var(--radius-sm);padding:14px 18px;cursor:pointer;transition:background .15s,transform .15s;display:flex;align-items:center;justify-content:space-between;}
.km-sub-card:hover{background:var(--c-km-bg);transform:translateX(3px);}
.km-sub-left .km-sub-name{font-family:var(--font-d);font-size:14px;font-weight:800;color:var(--c-km);margin-bottom:2px;}
.km-sub-left .km-sub-desc{font-size:12px;color:var(--text2);}
.km-sub-right{text-align:right;flex-shrink:0;}
.km-sub-time{font-family:var(--font-d);font-size:12px;font-weight:700;color:var(--text3);}
.km-sub-type{font-size:10px;color:var(--text3);margin-top:2px;}

/* INTRO PANEL */
.intro-panel{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);margin-bottom:20px;}
.intro-title{font-family:var(--font-d);font-size:18px;font-weight:900;margin-bottom:6px;}
.intro-sub{font-size:13px;color:var(--text2);margin-bottom:18px;line-height:1.5;}
.intro-specs{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
.spec-row{display:flex;align-items:center;gap:10px;}
.spec-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.spec-text{font-size:13px;color:var(--text);}
.spec-text strong{font-weight:700;}
.start-exam-btn{width:100%;padding:15px;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:700;font-family:var(--font-d);cursor:pointer;transition:opacity .15s;color:white;}
.start-exam-btn.gr{background:var(--c-gr);}
.start-exam-btn.jp{background:var(--c-jp);}
.start-exam-btn.km{background:var(--c-km);}
.start-exam-btn:hover{opacity:.9;}

/* EXAM SCREEN */
.exam-topbar{display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius);padding:12px 18px;margin-bottom:20px;box-shadow:var(--shadow);}
.exam-subj-tag{font-family:var(--font-d);font-size:13px;font-weight:800;}
.timer-wrap{display:flex;align-items:center;gap:8px;}
.timer-icon{width:8px;height:8px;border-radius:50%;background:var(--ok);}
.timer-icon.warn{background:var(--warn);}
.timer-display{font-family:var(--font-d);font-size:16px;font-weight:900;color:var(--text);}
.timer-display.warn{color:var(--warn);}
.submit-btn{padding:8px 18px;background:var(--c-km);color:white;border:none;border-radius:24px;font-size:12px;font-weight:700;font-family:var(--font-d);cursor:pointer;}

.section-divider{background:var(--bg3);border-radius:var(--radius-sm);padding:10px 16px;margin:20px 0 14px;display:flex;align-items:center;justify-content:space-between;}
.section-divider-name{font-family:var(--font-d);font-size:13px;font-weight:800;color:var(--text);}
.section-divider-meta{font-size:11px;color:var(--text3);font-family:var(--font-d);}

/* AUDIO BOX */
.audio-box{background:var(--bg2);border:1.5px solid var(--c-jp-bd);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px;}
.play-btn{width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s;}
.play-btn:hover{opacity:.85;}
.play-btn svg{width:16px;height:16px;fill:white;}
.audio-label{font-size:10px;font-weight:800;font-family:var(--font-d);margin-bottom:3px;}
.audio-text{font-size:13px;color:var(--text);line-height:1.55;}

/* Q CARD */
.q-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px;box-shadow:var(--shadow);}
.q-num{font-family:var(--font-d);font-size:11px;font-weight:800;color:var(--text3);margin-bottom:8px;}
.q-text{font-size:16px;font-weight:700;line-height:1.55;margin-bottom:6px;}
.q-sub{font-size:13px;color:var(--text2);margin-top:6px;line-height:1.6;}
.q-passage{font-size:13px;color:var(--text);margin-top:10px;line-height:1.7;background:var(--bg);border-radius:var(--radius-sm);padding:12px 14px;border-left:3px solid var(--border2);}

/* OPTIONS */
.options{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.opt{background:var(--bg2);border:1.5px solid var(--border2);border-radius:var(--radius-sm);padding:12px 16px;text-align:left;font-size:14px;font-family:var(--font-b);color:var(--text);cursor:pointer;transition:all .15s;width:100%;display:flex;align-items:flex-start;gap:10px;}
.opt:hover{background:var(--bg3);}
.opt.selected{border-color:var(--c-km);background:var(--c-km-bg);}
.opt-label{font-family:var(--font-d);font-size:12px;font-weight:800;width:18px;flex-shrink:0;color:var(--text3);}
.opt.selected .opt-label{color:var(--c-km);}
.opt-text{flex:1;line-height:1.4;}

/* ESSAY IN EXAM */
.essay-exam-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px;box-shadow:var(--shadow);}
.essay-exam-badge{display:inline-block;background:var(--warn-bg);border:1px solid var(--warn-bd);border-radius:20px;padding:3px 10px;font-size:10px;font-weight:800;font-family:var(--font-d);color:var(--warn);margin-bottom:10px;}
.essay-exam-q{font-size:15px;font-weight:700;line-height:1.55;margin-bottom:10px;}
.essay-exam-note{font-size:12px;color:var(--text2);line-height:1.5;background:var(--bg);border-radius:var(--radius-sm);padding:10px 14px;}

/* RESULT */
.result-header{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);margin-bottom:20px;text-align:center;}
.result-exam-name{font-size:13px;color:var(--text2);margin-bottom:12px;font-family:var(--font-d);}
.pass-badge{display:inline-block;border-radius:24px;padding:6px 20px;font-family:var(--font-d);font-size:14px;font-weight:800;margin-bottom:16px;}
.pass-badge.pass{background:var(--ok-bg);color:var(--ok);border:1.5px solid var(--ok-bd);}
.pass-badge.fail{background:var(--ng-bg);color:var(--ng);border:1.5px solid var(--ng-bd);}
.pass-badge.ref{background:var(--warn-bg);color:var(--warn);border:1.5px solid var(--warn-bd);}
.score-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
@media(max-width:400px){.score-grid{grid-template-columns:1fr 1fr;}}
.score-cell{background:var(--bg);border-radius:var(--radius-sm);padding:12px 8px;text-align:center;}
.score-val{font-family:var(--font-d);font-size:22px;font-weight:900;color:var(--text);}
.score-val.pass{color:var(--ok);}
.score-val.fail{color:var(--ng);}
.score-label{font-size:10px;color:var(--text3);margin-top:3px;font-family:var(--font-d);}
.result-msg{font-size:13px;color:var(--text2);line-height:1.6;}
.xp-earned{display:inline-block;background:#fef9ec;border:1.5px solid #fde68a;border-radius:24px;padding:7px 20px;font-family:var(--font-d);font-size:16px;font-weight:800;color:var(--c-xp);margin-top:12px;}

.wrong-panel{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:20px;}
.wrong-head{font-family:var(--font-d);font-size:14px;font-weight:800;color:var(--ng);margin-bottom:14px;}
.wrong-item{padding:10px 0;border-bottom:1px solid var(--border);}
.wrong-item:last-child{border-bottom:none;padding-bottom:0;}
.wrong-q{font-size:13px;font-weight:700;margin-bottom:3px;}
.wrong-detail{display:flex;gap:16px;font-size:12px;color:var(--text2);}
.wrong-detail .correct{color:var(--ok);font-weight:700;}
.wrong-detail .yours{color:var(--ng);}

.compare-panel{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:20px;}
.compare-head{font-family:var(--font-d);font-size:14px;font-weight:800;margin-bottom:14px;}
.compare-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border);}
.compare-row:last-child{border-bottom:none;}
.compare-date{font-size:12px;color:var(--text3);font-family:var(--font-d);width:80px;flex-shrink:0;}
.compare-bar-wrap{flex:1;height:8px;background:var(--bg3);border-radius:10px;overflow:hidden;}
.compare-bar{height:100%;border-radius:10px;transition:width .8s cubic-bezier(.4,0,.2,1);}
.compare-score{font-family:var(--font-d);font-size:13px;font-weight:800;width:48px;text-align:right;flex-shrink:0;}

.result-btns{display:flex;gap:12px;margin-top:4px;}
.rb-again{flex:1;padding:14px;background:white;border:2px solid var(--c-km);border-radius:var(--radius-sm);font-size:14px;font-weight:800;font-family:var(--font-d);cursor:pointer;color:var(--c-km);}
.rb-home{flex:1;padding:14px;background:var(--c-km);color:white;border:2px solid var(--c-km);border-radius:var(--radius-sm);font-size:14px;font-weight:800;font-family:var(--font-d);cursor:pointer;}

/* COIN */
@keyframes cf{0%{opacity:0;transform:translateY(0) scale(.4)}20%{opacity:1;transform:translateY(-12px) scale(1.15)}80%{opacity:1;transform:translateY(-60px)}100%{opacity:0;transform:translateY(-88px) scale(.4)}}
.coin-el{position:fixed;pointer-events:none;z-index:999;width:22px;height:22px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#ffe066,#f9c846,#d4a017);border:1.5px solid #e5a800;animation:cf .95s ease-out forwards;}

/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--text);color:white;border-radius:24px;padding:10px 22px;font-size:13px;font-family:var(--font-d);font-weight:700;opacity:0;transition:all .28s;z-index:300;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .38s ease both;}
.d1{animation-delay:.04s}.d2{animation-delay:.1s}.d3{animation-delay:.16s}.d4{animation-delay:.22s}
</style>
</head>
<body>
<div id="cl" style="position:fixed;inset:0;pointer-events:none;z-index:998;"></div>
<div class="toast" id="toast"></div>

<div class="page">
  <div class="topbar fu d1">
    <a class="back-btn" href="dashboard.html">← 返回儀表板</a>
    <div class="page-title">模擬考試</div>
    <div class="xp-chip"><div class="xp-dot"></div><span class="xp-val" id="xpv">0</span></div>
  </div>
  <div id="main"></div>
</div>

<script>
// ── STATE ──
function defS(){return{xp:0,mockHistory:[]};}
let S=(()=>{try{return{...defS(),...JSON.parse(localStorage.getItem('lq3'))};}catch(e){return defS();}})();
const sv=()=>localStorage.setItem('lq3',JSON.stringify(S));

// ── EXAM DEFINITIONS ──
const EXAMS={
  gr:{
    key:'gr', label:'全民英檢初級', cls:'gr',
    sub:'聽力 + 閱讀（合併模擬）',
    specs:[
      {label:'聽力測驗',val:'30 題，約 20 分鐘'},
      {label:'閱讀測驗',val:'30 題，35 分鐘'},
      {label:'通過標準',val:'總分 160 分，單項不低於 72 分'},
      {label:'計時方式',val:'顯示用時，不強制交卷'},
    ],
    totalMins:55,
  },
  jp:{
    key:'jp', label:'日本語能力試験 N5', cls:'jp',
    sub:'言語知識・讀解 + 聽解',
    specs:[
      {label:'言語知識・讀解',val:'60 分鐘'},
      {label:'聽解',val:'約 30 分鐘'},
      {label:'通過標準',val:'總分 80 分，言語知識・讀解 38 分，聽解 19 分'},
      {label:'計時方式',val:'顯示用時，不強制交卷'},
    ],
    totalMins:90,
  },
  km:{
    key:'km', label:'關務三等特考', cls:'km',
    sub:'選擇一科進行單科模擬',
    specs:[],
    totalMins:120,
    subs:[
      {key:'km-law',     label:'法學知識',     desc:'憲法 + 法學緒論，50 題選擇題', time:60,  type:'mc'},
      {key:'km-chinese', label:'國文',         desc:'作文 2 題 + 測驗 10 題',       time:120, type:'mix'},
      {key:'km-admin',   label:'行政法',       desc:'申論題 3 題',                   time:120, type:'essay'},
      {key:'km-finance', label:'財政學',       desc:'申論題 3 題',                   time:120, type:'essay'},
      {key:'km-trade',   label:'國際貿易實務', desc:'申論題 3 題',                   time:120, type:'essay'},
      {key:'km-eng',     label:'外國文（英文）',desc:'混合式，選擇 + 翻譯',          time:120, type:'mix'},
    ]
  }
};

// ── QUESTIONS ──
const ABCD=['A','B','C','D'];

// GEPT listening
const GEPT_LISTEN=[
  {type:'看圖辨義',audio:'A man is standing at a bus stop, looking at his watch and holding an umbrella.',q:'根據描述，這個男士最可能在做什麼？',opts:['Waiting for a bus in the rain.','Reading a newspaper at home.','Shopping in a store.','Eating lunch outside.'],ans:0,exp:'關鍵詞：bus stop（公車站）、watch（手錶）、umbrella（雨傘），選 A。'},
  {type:'問答',audio:'How was your weekend?',q:'最自然的回應是？',opts:['It was great! I went hiking.','Yes, I like weekdays.','The weekend is two days.','I work on Saturdays.'],ans:0,exp:'"How was your weekend?" 詢問週末過得如何，自然回應描述活動，選 A。'},
  {type:'簡短對話',audio:'Woman: I can\'t find my keys. Man: Did you check your coat pocket? Woman: Oh! They\'re here. Thanks!',q:'女士的鑰匙在哪裡？',opts:['In her coat pocket.','On the table.','In her bag.','She lost them.'],ans:0,exp:'女士說 "They\'re here" 在男士建議看外套口袋後，答案是外套口袋。'},
  {type:'短文聽解',audio:'The school library will be open this Saturday from 9 AM to 5 PM for students preparing for exams. Please bring your student ID.',q:'圖書館這週六的開放時間是？',opts:['9 AM to 5 PM.','8 AM to 6 PM.','All day.','It will be closed.'],ans:0,exp:'短文說 "9 AM to 5 PM"，選 A。'},
  {type:'看圖辨義',audio:'Three people are sitting around a table, looking at documents and having a discussion.',q:'這些人最可能在做什麼？',opts:['Having a meeting.','Having dinner.','Playing cards.','Watching TV.'],ans:0,exp:'table + documents + discussion = 會議場景，選 A。'},

// ── EXAM STATE ──
let curExam='', curSub='', examQuestions=[], examAnswers=[], timerInterval=null, elapsedSecs=0;

// ── MONTHLY CHECK ──
function thisMonth(){return new Date().toISOString().slice(0,7);}
function doneThisMonth(){
  const hist=S.mockHistory||[];
  return hist.some(h=>h.date&&h.date.slice(0,7)===thisMonth());
}

// ── LAST SCORE ──
function lastScore(key){
  const hist=(S.mockHistory||[]).filter(h=>h.key===key);
  if(!hist.length)return null;
  return hist[hist.length-1];
}

// ── SHOW INTRO ──

    if(key==='km-law') html+=`<div class="spec-row"><div class="spec-dot" style="background:var(--c-km)"></div><span class="spec-text"><strong>題型：</strong>單一選擇題 50 題，每題 2 分，滿分 100 分</span></div>`;
    else if(key==='km-chinese') html+=`<div class="spec-row"><div class="spec-dot" style="background:var(--c-km)"></div><span class="spec-text"><strong>題型：</strong>作文 2 題（各 40 分）+ 測驗 10 題（共 20 分）</span></div>`;
    else html+=`<div class="spec-row"><div class="spec-dot" style="background:var(--c-km)"></div><span class="spec-text"><strong>題型：</strong>申論題 3 題，各 25 分，參考答案供對照</span></div>`;

// ── BUILD QUESTIONS ──
function buildQuestions(key){
  const qs=[];
  if(key==='gr'){
    GEPT_LISTEN.forEach((q,i)=>qs.push({...randOpt(q),section:'聽力測驗',sectionMeta:'30 題',idx:i}));
    GEPT_READ.forEach((q,i)=>qs.push({...randOpt(q),section:'閱讀測驗',sectionMeta:'30 題',idx:i}));
  } else if(key==='jp'){
    JP_LANG.forEach((q,i)=>qs.push({...randOpt(q),section:'言語知識・讀解',sectionMeta:'60 分鐘',idx:i}));
    JP_LISTEN.forEach((q,i)=>qs.push({...q,section:'聽解',sectionMeta:'約 30 分鐘',idx:i}));
  } else if(key==='km-law'){
    KM_LAW_MC.forEach((q,i)=>qs.push({...randOpt(q),section:'法學知識',sectionMeta:'50 題選擇題',idx:i}));
  } else if(key==='km-admin'){
    KM_ADMIN_ESSAY.forEach((q,i)=>qs.push({...q,section:'行政法申論',sectionMeta:'3 題，各 25 分',idx:i}));
  } else if(key==='km-finance'){
    KM_FINANCE_ESSAY.forEach((q,i)=>qs.push({...q,section:'財政學申論',sectionMeta:'3 題，各 25 分',idx:i}));
  } else if(key==='km-trade'){
    KM_TRADE_ESSAY.forEach((q,i)=>qs.push({...q,section:'國際貿易實務申論',sectionMeta:'3 題，各 25 分',idx:i}));
  } else if(key==='km-chinese'){
    KM_CHINESE_ESSAY.forEach((q,i)=>qs.push({...q,section:'國文作文',sectionMeta:'2 題，各 40 分',idx:i}));
    KM_CHINESE_MC.forEach((q,i)=>qs.push({...randOpt(q),section:'國文測驗',sectionMeta:'10 題，共 20 分',idx:i}));
  }
  return qs;
}

function randOpt(q){
  if(q.type==='申論題'||q.type==='作文')return q;
  const correct=q.opts[q.ans];
  const s=[...q.opts].sort(()=>Math.random()-.5);
  return{...q,opts:s,ans:s.indexOf(correct)};
}

// ── START EXAM ──
function startExam(key){
  curExam=key;
  examQuestions=buildQuestions(key);
  examAnswers=new Array(examQuestions.length).fill(null);
  elapsedSecs=0;
  renderExam();
  startTimer();
}

function startTimer(){
  if(timerInterval)clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    elapsedSecs++;
    const el=document.getElementById('timer-display');
    if(el){
      const m=Math.floor(elapsedSecs/60),s=elapsedSecs%60;
      el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      const ex=EXAMS[curExam]||EXAMS.km.subs.find(x=>x.key===curExam);
      const warn=elapsedSecs>(ex?(ex.totalMins||ex.time||120):120)*60*0.85;
      el.classList.toggle('warn',warn);
      const icon=document.getElementById('timer-icon');
      if(icon)icon.classList.toggle('warn',warn);
    }
  },1000);
}

function renderExam(){
  const ex=EXAMS[curExam]||EXAMS.km.subs.find(s=>s.key===curExam);
  const label=curExam.startsWith('km-')?EXAMS.km.subs.find(s=>s.key===curExam).label:(ex?ex.label:curExam);
  const cls=curExam.startsWith('km-')?'km':curExam;

  let html=`<div class="exam-topbar">
    <div class="exam-subj-tag" style="color:var(--c-${cls})">${label}</div>
    <div class="timer-wrap">
      <div class="timer-icon" id="timer-icon"></div>
      <div class="timer-display" id="timer-display">00:00</div>
    </div>
    <button class="submit-btn" onclick="confirmSubmit()">交卷</button>
  </div>`;

  let lastSection='';
  examQuestions.forEach((q,i)=>{
    if(q.section!==lastSection){
      html+=`<div class="section-divider"><span class="section-divider-name">${q.section}</span><span class="section-divider-meta">${q.sectionMeta}</span></div>`;
      lastSection=q.section;
    }
    if(q.type==='申論題'||q.type==='作文'){
      html+=`<div class="essay-exam-card">
        <div class="essay-exam-badge">申論題 / 作文</div>
        <div class="essay-exam-q">${q.q.replace(/\n/g,'<br>')}</div>
        <div class="essay-exam-note">請在紙上作答，完成後點交卷查看參考答案與評分重點。</div>
      </div>`;
    } else {
      const isAudio=!!(q.audio);
      const audioLang=(q.section&&q.section.includes('聽解'))?'jp':'en';
      html+=`<div class="q-card" id="qcard-${i}">
        <div class="q-num">第 ${i+1} 題 · ${q.type}</div>`;
      if(isAudio){
        const bgCol=audioLang==='jp'?'var(--c-jp)':'var(--c-gr)';
        const borderCol=audioLang==='jp'?'var(--c-jp-bd)':'var(--c-gr-bd)';
        html+=`<div class="audio-box" style="border-color:${borderCol}">
          <button class="play-btn" style="background:${bgCol}" onclick="playAudio(${i})">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          </button>
          <div>
            <div class="audio-label" style="color:${bgCol}">播放題目</div>
            <div class="audio-text" id="audio-${i}">${q.audio}</div>
          </div>
        </div>`;
      }
      const qText=q.tc||q.q;
      html+=`<div class="q-text">${qText}</div>`;
      if(q.passage) html+=`<div class="q-passage">${q.passage}</div>`;
      html+=`</div>
        <div class="options">`;
      (q.opts||[]).forEach((o,j)=>{
        html+=`<button class="opt" id="opt-${i}-${j}" onclick="selectOpt(${i},${j})">
          <span class="opt-label">${ABCD[j]}</span>
          <span class="opt-text">${o}</span>
        </button>`;
      });
      html+=`</div>`;
    }
  });

  html+=`<div style="margin-top:20px;"><button class="start-exam-btn km" onclick="confirmSubmit()" style="width:100%;">交卷並查看結果</button></div>`;
  document.getElementById('main').innerHTML=html;

  // auto play first audio
  if(examQuestions[0]&&examQuestions[0].audio){
    setTimeout(()=>playAudio(0),600);
  }
}

function playAudio(i){
  const el=document.getElementById('audio-${i}');
  const q=examQuestions[i];
  if(!q||!q.audio)return;
  window.speechSynthesis&&window.speechSynthesis.cancel();
  const isJp=q.section&&q.section.includes('聽解');
  const u=new SpeechSynthesisUtterance(q.audio);
  u.lang=isJp?'ja-JP':'en-US';
  u.rate=isJp?0.8:0.9;
  window.speechSynthesis&&window.speechSynthesis.speak(u);
}

function selectOpt(qi,oi){
  const q=examQuestions[qi];
  if(!q||q.type==='申論題'||q.type==='作文')return;
  const prev=examAnswers[qi];
  if(prev!==null){
    const prevBtn=document.getElementById(`opt-${qi}-${prev}`);
    if(prevBtn)prevBtn.classList.remove('selected');
  }
  examAnswers[qi]=oi;
  const btn=document.getElementById(`opt-${qi}-${oi}`);
  if(btn)btn.classList.add('selected');
}

function confirmSubmit(){
  const mcQs=examQuestions.filter(q=>q.type!=='申論題'&&q.type!=='作文');
  const unanswered=mcQs.filter((_,i)=>{
    const realIdx=examQuestions.indexOf(mcQs.find(q=>q===mcQs[i]));
    return examAnswers[realIdx]===null;
  }).length;

  if(unanswered>0){
    if(!confirm(`還有 ${unanswered} 題選擇題未作答，確定要交卷嗎？`))return;
  }
  submitExam();
}

function submitExam(){
  if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
  window.speechSynthesis&&window.speechSynthesis.cancel();
  renderResult();
}

// ── RESULT ──
function renderResult(){
  const key=curExam;
  const qs=examQuestions;
  const ans=examAnswers;
  const cls=key.startsWith('km-')?'km':key;
  const label=key.startsWith('km-')?EXAMS.km.subs.find(s=>s.key===key).label:(EXAMS[key]?EXAMS[key].label:key);

  // calc scores
  const mcQs=qs.filter(q=>q.type!=='申論題'&&q.type!=='作文');
  let correct=0;
  const wrongItems=[];
  mcQs.forEach(q=>{
    const qi=qs.indexOf(q);
    const userAns=ans[qi];
    if(userAns===q.ans)correct++;
    else if(userAns!==null)wrongItems.push({q:q.tc||q.q,correct:ABCD[q.ans]+'. '+q.opts[q.ans],yours:userAns!==null?ABCD[userAns]+'. '+q.opts[userAns]:'未作答'});
  });

  const essayQs=qs.filter(q=>q.type==='申論題'||q.type==='作文');
  const hasMC=mcQs.length>0;
  const hasEssay=essayQs.length>0;

  // compute pct and result
  let totalScore=0, passResult='ref', resultMsg='', scoreItems=[];
  const pct=hasMC?Math.round(correct/mcQs.length*100):null;

  if(key==='gr'){
    const listenQ=qs.filter(q=>q.section==='聽力測驗');
    const readQ=qs.filter(q=>q.section==='閱讀測驗');
    let lc=0,rc=0;
    listenQ.forEach(q=>{const qi=qs.indexOf(q);if(ans[qi]===q.ans)lc++;});
    readQ.forEach(q=>{const qi=qs.indexOf(q);if(ans[qi]===q.ans)rc++;});
    const lScore=Math.round(lc/listenQ.length*120);
    const rScore=Math.round(rc/readQ.length*120);
    totalScore=lScore+rScore;
    const pass=totalScore>=160&&lScore>=72&&rScore>=72;
    passResult=pass?'pass':'fail';
    scoreItems=[{label:'聽力',val:lScore,max:120,pass:lScore>=72},{label:'閱讀',val:rScore,max:120,pass:rScore>=72},{label:'總分',val:totalScore,max:240,pass:totalScore>=160}];
    resultMsg=pass?`總分 ${totalScore}，聽力 ${lScore}，閱讀 ${rScore}，全部達標！`:`總分 ${totalScore}，通過標準為 160 分且單項不低於 72 分。`;
  } else if(key==='jp'){
    const langQ=qs.filter(q=>q.section==='言語知識・讀解');
    const lisQ=qs.filter(q=>q.section==='聽解');
    let lc=0,lc2=0;
    langQ.forEach(q=>{const qi=qs.indexOf(q);if(ans[qi]===q.ans)lc++;});
    lisQ.forEach(q=>{const qi=qs.indexOf(q);if(ans[qi]===q.ans)lc2++;});
    const langScore=Math.round(lc/langQ.length*120);
    const lisScore=Math.round(lc2/lisQ.length*60);
    totalScore=langScore+lisScore;
    const pass=totalScore>=80&&langScore>=38&&lisScore>=19;
    passResult=pass?'pass':'fail';
    scoreItems=[{label:'言語知識・讀解',val:langScore,max:120,pass:langScore>=38},{label:'聽解',val:lisScore,max:60,pass:lisScore>=19},{label:'總分',val:totalScore,max:180,pass:totalScore>=80}];
    resultMsg=pass?`合計 ${totalScore} 分，全部達通過標準！`:`總分 ${totalScore}，通過標準：總分 80 分，言語知識・讀解 38 分，聽解 19 分。`;
  } else if(key==='km-law'){
    totalScore=correct*2;
    const pctLaw=Math.round(totalScore);
    scoreItems=[{label:'答對題數',val:correct,max:mcQs.length},{label:'得分',val:totalScore,max:100},{label:'正確率',val:pct+'%'}];
    resultMsg=`答對 ${correct}/${mcQs.length} 題，得分 ${totalScore} 分（以排名決定錄取，無固定通過分數）。`;
    passResult='ref';
  } else if(key==='km-chinese'){
    const mcScore=correct*2;
    scoreItems=[{label:'測驗得分',val:mcScore,max:20},{label:'測驗正確率',val:pct+'%'},{label:'作文',val:'請對照參考答案'}];
    resultMsg=`測驗部分得 ${mcScore} 分。作文共 2 題各 40 分，請對照參考答案評估自己的答題水準。`;
    passResult='ref';totalScore=mcScore;
  } else {
    passResult='ref';
    resultMsg='申論題已完成，請對照下方參考答案評估作答水準。成績以當次考生排名決定錄取。';
    scoreItems=[{label:'申論題',val:hasEssay?essayQs.length+'題':'—'},{label:'考試用時',val:fmtSecs(elapsedSecs)}];
  }

  // save history
  if(!S.mockHistory)S.mockHistory=[];
  S.mockHistory.push({
    key,date:new Date().toISOString().slice(0,10),
    totalScore,pct:pct||Math.round(correct/(mcQs.length||1)*100),
    correct,total:mcQs.length,
    elapsedSecs,
  });
  sv();

  // XP
  const isMonthly=doneThisMonth();
  const baseXp=60;
  const xpMult=isMonthly?1:2;
  const xpEarned=Math.round(baseXp*(pct||70)/100)*xpMult;
  S.xp=(S.xp||0)+xpEarned; sv();
  document.getElementById('xpv').textContent=S.xp.toLocaleString();

  const passLabel={pass:'通過',fail:'未通過',ref:'完成'}[passResult];
  const passCls={pass:'pass',fail:'fail',ref:'ref'}[passResult];

  let html=`<div class="result-header fu d1">
    <div class="result-exam-name">${label} · 用時 ${fmtSecs(elapsedSecs)}</div>
    <div class="pass-badge ${passCls}">${passLabel}</div>
    <div class="score-grid">`;
  scoreItems.forEach(s=>{
    const vc=typeof s.pass!=='undefined'?(s.pass?'pass':'fail'):'';
    html+=`<div class="score-cell"><div class="score-val ${vc}">${s.val}${s.max?'':''}</div><div class="score-label">${s.label}${s.max?` / ${s.max}`:''}</div></div>`;
  });
  html+=`</div>
    <div class="result-msg">${resultMsg}</div>
    <div class="xp-earned">+${xpEarned} XP${xpMult===2?' （本月首次，雙倍！）':''}</div>
  </div>`;

  // wrong items (MC)
  if(wrongItems.length){
    html+=`<div class="wrong-panel fu d2">
      <div class="wrong-head">選擇題錯題（${wrongItems.length} 題）</div>`;
    wrongItems.forEach(w=>{
      html+=`<div class="wrong-item">
        <div class="wrong-q">${w.q}</div>
        <div class="wrong-detail">
          <span>正確：<span class="correct">${w.correct}</span></span>
          <span>你的答案：<span class="yours">${w.yours}</span></span>
        </div>
      </div>`;
    });
    html+=`</div>`;
  }

  // essay reference answers
  if(hasEssay){
    html+=`<div class="wrong-panel fu d3">
      <div class="wrong-head">申論題 / 作文參考答案</div>`;
    essayQs.forEach((q,i)=>{
      html+=`<div class="wrong-item">
        <div class="wrong-q" style="margin-bottom:8px;">${q.q.replace(/\n/g,'<br>')}</div>
        <div style="font-size:11px;font-weight:700;color:var(--text3);font-family:var(--font-d);margin-bottom:5px;">評分重點</div>
        <div style="font-size:12px;color:var(--text2);line-height:1.65;background:var(--bg);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:8px;">${(q.points||'').replace(/\n/g,'<br>')}</div>
        <div style="font-size:11px;font-weight:700;color:var(--ok);font-family:var(--font-d);margin-bottom:5px;">參考答案</div>
        <div style="font-size:12px;color:var(--text);line-height:1.7;background:var(--ok-bg);border:1px solid var(--ok-bd);border-radius:var(--radius-sm);padding:10px 12px;">${(q.ref||'').replace(/\n/g,'<br>')}</div>
      </div>`;
    });
    html+=`</div>`;
  }

  html+=`<div class="result-btns fu d4">
    <button class="rb-again" onclick="showIntro('${key}')">再考一次</button>
    <button class="rb-home" onclick="renderSelect()">返回選擇</button>
  </div>`;

  document.getElementById('main').innerHTML=html;
  burstCoins();
}

function fmtSecs(s){const m=Math.floor(s/60),ss=s%60;return`${m}分${String(ss).padStart(2,'0')}秒`;}

// COINS
function burstCoins(){for(let i=0;i<14;i++)setTimeout(()=>coin(Math.random()*window.innerWidth,window.innerHeight*.4+Math.random()*80),i*55);}
function coin(x,y){const c=document.createElement('div');c.className='coin-el';c.style.left=(x+(Math.random()-.5)*22)+'px';c.style.top=y+'px';document.getElementById('cl').appendChild(c);setTimeout(()=>c.remove(),1000);}

let tt;
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2400);}

// INIT
document.getElementById('xpv').textContent=(S.xp||0).toLocaleString();
renderSelect();
</script>
</body>
</html>
